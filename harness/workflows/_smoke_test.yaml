# Trivial two-state smoke test for the runner (Task 3 verification).
# No real journal interaction: reads/writes are empty, this only confirms
# the runner can load YAML, invoke the Claude Code CLI headless once per
# state, and terminate cleanly.
workflow: smoke_test
states:
  - name: ping
    role: executor_claude
    reads: []
    writes: []
    prompt_template: harness/workflows/prompts/_smoke_ping.md
    next_on_success: pong
    next_on_failure: end
  - name: pong
    role: executor_claude
    reads: []
    writes: []
    prompt_template: harness/workflows/prompts/_smoke_pong.md
    next_on_success: end
    next_on_failure: end
